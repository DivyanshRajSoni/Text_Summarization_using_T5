<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 40px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #1a5f9c;
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: 700;
        }

        h3 {
            text-align: center;
            margin-bottom: 25px;
            color: #7f8c8d;
            font-size: 0.95em;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea {
            height: 160px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: #f9f9f9;
            color: #333;
            font-family: 'Segoe UI', sans-serif;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #1a5f9c;
            background: #fff;
            box-shadow: 0 0 8px rgba(26, 95, 156, 0.2);
        }

        button {
            background: linear-gradient(135deg, #1a5f9c 0%, #2980b9 100%);
            color: #fff;
            border: none;
            padding: 13px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 95, 156, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 95, 156, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #summary-output {
            margin-top: 30px;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f7 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #1a5f9c;
        }

        #summary-heading {
            color: #1a5f9c;
            font-size: 1.1em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #summary-text {
            color: #555;
            line-height: 1.7;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Summarizer</h1>
        <h3>using HuggingFace Transformer</h3>
        <p>Write or Paste your content below for quick summarization.</p>

        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your content here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>

        <div id="summary-output">
            <h3 id="summary-heading">Content Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        document.getElementById("summarization-form").addEventListener("submit", async (e) => {
            e.preventDefault();
        
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
        
            summaryText.innerText = "Processing...";
            submitButton.disabled = true;
        
            try {
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } catch (err) {
                
                summaryText.innerText = `Error: ${err.message}`;
            } finally {
                
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
